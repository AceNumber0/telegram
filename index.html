<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Digital Asset Terminal</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 30px; border-radius: 20px; width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #242f3d; }
        h2 { color: #24a1de; margin-bottom: 10px; font-size: 22px; }
        p.subtitle { color: #818d99; font-size: 13px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; color: #abaeb2; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #242f3d; background: #242f3d; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-weight: bold; }
        input:focus { border-color: #24a1de; }
        .price-tag { font-size: 28px; font-weight: bold; margin: 20px 0; color: #ffffff; }
        .price-tag span { font-size: 16px; color: #24a1de; margin-left: 5px; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(90deg, #24a1de, #0088cc); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3); }
    </style>
</head>
<body>

    <div class="card">
        <h2>💎 Stars Terminal</h2>
        <p class="subtitle">Secure Institutional Asset Delivery</p>
        
        <div id="ton-connect"></div>

        <div class="input-group">
            <label>Recipient Username</label>
            <input type="text" placeholder="@username" id="user">
        </div>
        
        <div class="input-group">
            <label>Amount of Stars (Min: 500)</label>
            <input type="number" id="starsInput" value="500" min="500" oninput="updatePrice()">
        </div>
        
        <div class="price-tag"><span id="totalPrice">1.25</span> <span>TON</span></div>
        
        <button class="btn-buy" onclick="sendPayment()">CONFIRM PURCHASE</button>
        
        <p style="color: #4e5965; font-size: 10px; margin-top: 15px;">Official Wholesale Rate: 0.08 TON / Star (Bulk Discount Applied)</p>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        // حاسبة السعر التلقائية
        function updatePrice() {
            const stars = document.getElementById('starsInput').value;
            const priceDisplay = document.getElementById('totalPrice');
            
            if (stars < 500) {
                priceDisplay.innerText = "1.25"; // السعر الأدنى
                return;
            }
            
            // الحسبة: السعر الأساسي (500 نجمة = 1.25) + أي نجمة زيادة بـ 0.08
            const extraStars = stars - 500;
            const finalPrice = 1.25 + (extraStars * 0.08);
            priceDisplay.innerText = finalPrice.toFixed(2);
        }

        async function sendPayment() {
            if (!tonConnectUI.connected) {
                alert("Please connect your TON wallet first.");
                return;
            }

            const stars = document.getElementById('starsInput').value;
            if (stars < 500) {
                alert("Minimum order is 500 Stars.");
                return;
            }

            const finalPrice = 1.25 + (Math.max(0, stars - 500) * 0.08);
            const nanoAmount = (finalPrice * 1000000000).toString();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 120, 
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                    amount: nanoAmount 
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Order Placed! Stars will be sent to " + document.getElementById('user').value);
            } catch (e) {
                alert("Transaction Canceled. Insufficient TON for gas fees or user rejected.");
            }
        }
    </script>
</body>
</html>
