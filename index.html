<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stars Terminal</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 25px; border-radius: 15px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #24a1de; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #242f3d; color: white; box-sizing: border-box; }
        button { background: #24a1de; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #ton-connect { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⭐️ StarLink Hub</h2>
        
        <div id="ton-connect"></div>

        <div class="input-group">
            <label>Recipient Username</label>
            <input type="text" placeholder="@username" id="user">
        </div>
        <div class="input-group">
            <label>Amount of Stars</label>
            <input type="number" value="500" id="stars">
        </div>
        
        <p style="font-size: 1.2em;">Total: <span id="price">1.25</span> TON</p>
        
        <button onclick="sendPayment()">Buy Stars Now</button>
    </div>

    <script>
        // إعدادات الربط مع المحفظة
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        async function sendPayment() {
            // التحقق من ربط المحفظة أولاً
            if (!tonConnectUI.connected) {
                alert("Please connect your wallet first!");
                return;
            }

            // إعداد تفاصيل المعاملة
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300, 
                messages: [
                    {
                        address: "ضع_عنوان_محفظتك_هنا", // <--- حط عنوان محفظتك هنا لاستقبال الفلوس
                        amount: "1250000000" // مبلغ 1.25 TON بالنانو
                    }
                ]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                alert("Transaction Sent! Processing...");
            } catch (e) {
                console.error(e);
                alert("Transaction Failed or Canceled.");
            }
        }
    </script>
</body>
</html>
